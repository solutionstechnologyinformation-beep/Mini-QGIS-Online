<!DOCTYPE html>
<html>

<head>

<title>Mini QGIS Web</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Mini QGIS Web</h2>

<div id="map"></div>

<div class="panel">

<h3>Conversor de Coordenadas</h3>

X
<input id="x">

Y
<input id="y">

Origem
<select id="src">
<option value="4326">WGS84</option>
<option value="4674">SIRGAS2000</option>
<option value="31983">UTM 23S</option>
</select>

Destino
<select id="dst">
<option value="4326">WGS84</option>
<option value="4674">SIRGAS2000</option>
<option value="31983">UTM 23S</option>
</select>

<button onclick="convert()">Converter</button>

<p id="result"></p>

<h3>Importar arquivo GIS</h3>

<input type="file" id="file">

</div>

<script src="map.js"></script>
<script src="converter.js"></script>
<script src="upload.js"></script>

</body>
</html>
