version: "1"
projects:
- name: Mini-QGIS-Online
  environments:
  - name: Production
    services:
    - type: web
      name: mini-qgis-backend
      runtime: docker
      repo: https://github.com/solutionstechnologyinformation-beep/Mini-QGIS-Online
      plan: free
      region: oregon
      # O Render detectará automaticamente o Dockerfile na raiz do projeto
      # dockerContext: .
      # dockerfilePath: ./Dockerfile
      autoDeploy: true # Habilita o deploy automático em cada commit
      envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
